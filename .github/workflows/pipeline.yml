name: integracao continua

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  estagio_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          package-manager-cache: false

      - name: Gerar lockfile temporário
        run: npm install --package-lock-only

      - name: Instalar dependências
        run: npm install

      - name: Verificar sintaxe de todos os arquivos JS
        run: |
          find . -type f -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./.git/*" \
            ! -path "./dist/*" \
            -exec node --check {} \;

  estagio_lint:
    runs-on: ubuntu-latest
    needs: estagio_build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          package-manager-cache: false

      - name: Gerar lockfile temporário
        run: npm install --package-lock-only

      - name: Instalar dependências
        run: npm install

      - name: Instalar dependências temporárias do lint
        run: npm install --no-save eslint globals

      - name: Criar configuração temporária do ESLint
        run: |
          cat > eslint.config.js <<'EOF'
          const globals = require("globals");

          module.exports = [
            {
              files: ["**/*.js"],
              ignores: ["node_modules/**", ".git/**", "dist/**"],
              languageOptions: {
                ecmaVersion: 2021,
                sourceType: "commonjs",
                globals: {
                  ...globals.node,
                  ...globals.commonjs
                }
              },
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "error"
              }
            }
          ];
          EOF

      - name: Rodar lint
        run: npx eslint .

  estagio_test:
    runs-on: ubuntu-latest
    needs: estagio_lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          package-manager-cache: false

      - name: Instalar dependências
        run: npm install

      - name: Instalar c8 para cobertura de código
        run: npm install --no-save c8

      - name: Rodar testes com cobertura (LCOV)
        run: npx c8 --reporter=lcov --reporter=text node --test tests/

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  job_sonar:
    needs: estagio_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar relatório de cobertura
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Criar sonar-project.properties dinâmico
        run: |
          echo "sonar.projectKey=${{ github.event.repository.name }}" > sonar-project.properties
          echo "sonar.projectName=${{ github.event.repository.name }}" >> sonar-project.properties
          echo "sonar.branch.name=${{ github.ref_name }}" >> sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties
          echo "sonar.sourceEncoding=UTF-8" >> sonar-project.properties
          echo "sonar.exclusions=node_modules/**,.git/**,.github/**,coverage/**,dist/**,tests/**" >> sonar-project.properties
          echo "sonar.javascript.lcov.reportPaths=coverage/lcov.info" >> sonar-project.properties

      - name: Exibir configuração do Sonar
        run: cat sonar-project.properties

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.TOKEN_SONAR }}
          SONAR_HOST_URL: "https://devsecops.dcotech.com.br"
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
