name: integracao continua

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  estagio_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6.0.2

      - name: Configurar Node.js 18
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "18"

      - name: Gerar lockfile temporário
        run: npm install --package-lock-only

      - name: Instalar dependências
        run: npm install

      - name: Verificar sintaxe de todos os arquivos JS
        run: |
          find . -type f -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./.git/*" \
            ! -path "./dist/*" \
            -exec node --check {} \;

  estagio_lint:
    runs-on: ubuntu-latest
    needs: estagio_build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6.0.2

      - name: Configurar Node.js 18
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "18"

      - name: Gerar lockfile temporário
        run: npm install --package-lock-only

      - name: Instalar dependências
        run: npm install

      - name: Instalar dependências temporárias do lint
        run: npm install --no-save eslint globals

      - name: Criar configuração temporária do ESLint
        run: |
          cat > eslint.config.js <<'EOF'
          const globals = require("globals");

          module.exports = [
            {
              files: ["**/*.js"],
              ignores: ["node_modules/**", ".git/**", "dist/**"],
              languageOptions: {
                ecmaVersion: 2021,
                sourceType: "commonjs",
                globals: {
                  ...globals.node,
                  ...globals.commonjs
                }
              },
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "error"
              }
            }
          ];
          EOF

      - name: Rodar lint
        run: npx eslint .

  estagio_test:
    runs-on: ubuntu-latest
    needs: estagio_lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6.0.2

      - name: Configurar Node.js 18
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "18"

      - name: Instalar dependências
        run: npm install

      - name: Instalar c8 para cobertura de código
        run: npm install --no-save c8

      - name: Rodar testes com cobertura
        run: npx c8 --reporter=lcov --reporter=text --reporter=json-summary node --test tests/

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json

  job_sonar:
    needs: estagio_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Baixar relatório de cobertura
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-report
          path: coverage

      - name: Criar sonar-project.properties dinâmico
        run: |
          echo "sonar.projectKey=${{ github.event.repository.name }}" > sonar-project.properties
          echo "sonar.projectName=${{ github.event.repository.name }}" >> sonar-project.properties
          echo "sonar.branch.name=${{ github.ref_name }}" >> sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties
          echo "sonar.sourceEncoding=UTF-8" >> sonar-project.properties
          echo "sonar.exclusions=node_modules/**,.git/**,.github/**,coverage/**,dist/**,tests/**" >> sonar-project.properties
          echo "sonar.javascript.lcov.reportPaths=coverage/lcov.info" >> sonar-project.properties
          echo "sonar.coverage.exclusions=index.js" >> sonar-project.properties

      - name: Exibir configuração do Sonar
        run: cat sonar-project.properties

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.TOKEN_SONAR }}
          SONAR_HOST_URL: "https://devsecops.dcotech.com.br"
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}

  job_coverage_comment:
    needs: estagio_test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Baixar relatório de cobertura
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-report
          path: coverage

      - name: Calcular percentuais de cobertura
        id: coverage
        run: |
          LINES=$(node -e "const s=require('./coverage/coverage-summary.json');process.stdout.write(s.total.lines.pct.toFixed(1))")
          FUNCTIONS=$(node -e "const s=require('./coverage/coverage-summary.json');process.stdout.write(s.total.functions.pct.toFixed(1))")
          BRANCHES=$(node -e "const s=require('./coverage/coverage-summary.json');process.stdout.write(s.total.branches.pct.toFixed(1))")
          STATEMENTS=$(node -e "const s=require('./coverage/coverage-summary.json');process.stdout.write(s.total.statements.pct.toFixed(1))")

          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT

          MIN=50
          if (( $(echo "$LINES < $MIN" | bc -l) )); then
            echo "below_threshold=true" >> $GITHUB_OUTPUT
          else
            echo "below_threshold=false" >> $GITHUB_OUTPUT
          fi

      - name: Publicar comentário de cobertura no PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ## Relatorio de Cobertura de Testes

            | Metrica    | Cobertura |
            |------------|-----------|
            | Linhas     | ${{ steps.coverage.outputs.lines }}% |
            | Funcoes    | ${{ steps.coverage.outputs.functions }}% |
            | Branches   | ${{ steps.coverage.outputs.branches }}% |
            | Statements | ${{ steps.coverage.outputs.statements }}% |

            ${{ steps.coverage.outputs.below_threshold == 'true' && '> Cobertura abaixo do limite minimo de 50%. Corrija os testes antes de fazer merge.' || '> Cobertura dentro do limite minimo (50%).' }}

      - name: Bloquear merge se cobertura insuficiente
        if: steps.coverage.outputs.below_threshold == 'true'
        run: |
          echo "Cobertura de testes abaixo do minimo de 50%. Merge bloqueado."
          exit 1
